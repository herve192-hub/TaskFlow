# taskflow/backend/config-repo/application.yml ...
# all the shared configurations here ...

spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://admin:admin123@mongodb:27017/?authSource=admin}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}
  
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

info:
  application:
    name: taskflow
    version: 1.0.0
    author: Herve Chendjou

logging:
  level:
    root: INFO
    com.taskflow: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXTRATION_MS}

app:
  environment: ${APP_ENV:local}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173