# 
spring:
    data:
        mongodb:
            uri: mongodb://admin:admin123@localhost:27017/?authSource=admin

    kafka:
        bootstrap-servers: localhost:9092

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/

management:
    endpoints:
        web:
            exposure:
            include: health,info,metrics,prometheus

logging:
    level:
        com.taskflow: DEBUG

app:
    environment: development