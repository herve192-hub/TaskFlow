name: Bug Report

description: Report a bug
title: "[BUG]"
labels:
  - bug


body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the bug


  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce


  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior