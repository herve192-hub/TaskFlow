name: Backend CI


on:
  push:
    branches:
      - main
      - develop
      - dev/feature-workflows
    paths:
      - 'backend/**'
      
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: Maven

      - name: Verify Maven
        run: mvn -version
        
      - name: Build Backend
        run: ./mvnw clean verify

      # - name: Clean Project
      #   run: mvn clean

