      #   run: mvn compile

      # - name: Run Unit Tests
      #   run: mvn test

      # - name: Package Service
      #   run: mvn package

    #   - name: Run Integration Tests
    #     run: mvn integration-test

      # - name: Verify Build
      #   run: mvn verify